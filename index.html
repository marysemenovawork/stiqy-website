  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"79805c4a-9508-4d82-9412-f76e5d85bb5a\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<script src=\"5a83726b-000c-4fb3-bb5f-2d8929bfadfe\"><\u002Fscript>\n<script src=\"fa0ebdb2-f8d2-4e76-8e62-ef9d65800b6f\"><\u002Fscript>\n\n<style>\n*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n\n:root {\n  --white: #FFFFFF;\n  --black: #0D0D0D;\n  --orange: #FF5C2B;\n  --gray-light: #F4F4F2;\n  --gray-text: #666;\n  --gray-mid: #999;\n  --font: 'Plus Jakarta Sans', sans-serif;\n}\n\nhtml { scroll-behavior: smooth; font-family: var(--font); color: var(--black); background: var(--black); }\nbody { overflow-x: hidden; }\n\n/* ─── NAV ─── */\nnav {\n  position: fixed; top: 0; left: 0; right: 0; z-index: 200;\n  display: flex; align-items: center; justify-content: space-between;\n  padding: 0 48px; height: 68px;\n  transition: background 0.5s, border-bottom 0.5s;\n}\nnav.scrolled {\n  background: rgba(13,13,13,0.85);\n  backdrop-filter: blur(24px) saturate(180%);\n  -webkit-backdrop-filter: blur(24px) saturate(180%);\n  border-bottom: 1px solid rgba(255,255,255,0.07);\n}\n.nav-logo { font-size: 21px; font-weight: 800; letter-spacing: -0.5px; color: var(--white); text-decoration: none; }\n.nav-links { display: flex; align-items: center; gap: 36px; }\n.nav-links a { font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.6); text-decoration: none; transition: color 0.2s; }\n.nav-links a:hover { color: var(--white); }\n.btn-cta-nav {\n  background: var(--orange); color: var(--white) !important;\n  padding: 9px 20px; border-radius: 100px;\n  font-size: 14px !important; font-weight: 700 !important;\n  transition: transform 0.2s, opacity 0.2s !important;\n}\n.btn-cta-nav:hover { transform: scale(1.05); opacity: 0.9 !important; color: var(--white) !important; }\n.nav-hamburger { display: none; cursor: pointer; flex-direction: column; gap: 5px; }\n.nav-hamburger span { display: block; width: 22px; height: 2px; background: var(--white); border-radius: 2px; }\n\n/* ─── HERO ─── */\n#hero {\n  min-height: 100vh; background: var(--black);\n  display: flex; flex-direction: column; justify-content: center;\n  padding: 130px 48px 80px; position: relative; overflow: hidden;\n}\n.hero-bg-word {\n  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);\n  font-size: clamp(180px, 22vw, 340px); font-weight: 800;\n  color: rgba(255,255,255,0.03); letter-spacing: -8px; line-height: 1;\n  pointer-events: none; white-space: nowrap; user-select: none;\n}\n.hero-shape-1 {\n  position: absolute; top: 12%; right: 7%;\n  width: clamp(150px, 17vw, 260px); height: clamp(150px, 17vw, 260px);\n  border-radius: 50%; border: 1.5px solid rgba(255,92,43,0.22);\n  animation: spin-slow 22s linear infinite;\n}\n.hero-stat-bubble {\n  position: absolute; top: 12%; right: 7%;\n  width: clamp(150px, 17vw, 260px); height: clamp(150px, 17vw, 260px);\n  border-radius: 50%;\n  display: flex; flex-direction: column; align-items: center; justify-content: center;\n  pointer-events: none; z-index: 1;\n}\n.hero-stat-bubble .bnum { font-size: clamp(38px, 4.5vw, 64px); font-weight: 800; color: var(--orange); letter-spacing: -2px; line-height: 1; }\n.hero-stat-bubble .blabel { font-size: clamp(9px, 0.85vw, 11px); font-weight: 600; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 8px; text-align: center; line-height: 1.5; }\n.hero-shape-2 {\n  position: absolute; bottom: 18%; right: 14%;\n  width: clamp(8px, 1vw, 14px); height: clamp(8px, 1vw, 14px);\n  background: var(--orange); border-radius: 50%; opacity: 0.8;\n}\n.hero-shape-3 {\n  position: absolute; top: 22%; left: 4%;\n  width: 1px; height: clamp(80px, 12vh, 160px);\n  background: rgba(255,255,255,0.15);\n}\n.hero-shape-4 {\n  position: absolute; bottom: 20%; left: 10%;\n  width: clamp(40px, 4vw, 70px); height: clamp(40px, 4vw, 70px);\n  border: 1.5px solid rgba(255,255,255,0.12);\n  transform: rotate(45deg);\n}\n@keyframes spin-slow { to { transform: rotate(360deg); } }\n\n/* ─── HERO DASHBOARD CARD ─── */\n.hero-dashboard {\n  position: absolute; right: 5%; top: 50%; transform: translateY(-50%);\n  width: clamp(260px, 26vw, 380px);\n  display: flex; flex-direction: column; gap: 12px;\n  pointer-events: none; opacity: 0;\n}\n.hd-card {\n  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);\n  border-radius: 16px; padding: 20px; backdrop-filter: blur(12px);\n}\n.hd-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.3); margin-bottom: 14px; }\n.hd-stat-row { display: flex; justify-content: space-between; margin-bottom: 16px; }\n.hd-stat-val { font-size: 26px; font-weight: 800; color: var(--white); letter-spacing: -1px; }\n.hd-stat-val span { color: var(--orange); }\n.hd-stat-lbl { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 2px; }\n.hd-bar-wrap { display: flex; flex-direction: column; gap: 8px; }\n.hd-bar-row { display: flex; align-items: center; gap: 10px; }\n.hd-bar-label { font-size: 11px; color: rgba(255,255,255,0.35); width: 64px; flex-shrink: 0; }\n.hd-bar-track { flex: 1; height: 5px; background: rgba(255,255,255,0.07); border-radius: 10px; overflow: hidden; }\n.hd-bar-fill { height: 100%; border-radius: 10px; background: var(--orange); }\n.hd-bar-fill.muted { background: rgba(255,255,255,0.2); }\n.hd-bar-val { font-size: 11px; color: rgba(255,255,255,0.4); width: 30px; text-align: right; flex-shrink: 0; }\n.hd-emails { display: flex; flex-direction: column; gap: 10px; }\n.hd-email-row { display: flex; align-items: center; gap: 10px; }\n.hd-email-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }\n.hd-email-dot.orange { background: var(--orange); }\n.hd-email-dot.white { background: rgba(255,255,255,0.2); }\n.hd-email-lines { flex: 1; display: flex; flex-direction: column; gap: 4px; }\n.hd-email-line { height: 6px; background: rgba(255,255,255,0.08); border-radius: 4px; }\n.hd-email-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 100px; flex-shrink: 0; }\n.hd-email-badge.sent { background: rgba(255,92,43,0.15); color: var(--orange); }\n.hd-email-badge.draft { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.3); }\n.hd-pulse { animation: hd-pulse 2.4s ease-in-out infinite; }\n@keyframes hd-pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }\n\n/* ─── SERVICE ILLUSTRATIONS ─── */\n.service-illus { width: 100%; height: 100px; margin-bottom: 24px; border-radius: 10px; overflow: hidden; }\n\n@media (max-width: 1100px) { .hero-dashboard { display: none; } }\n\n.hero-label {\n  display: inline-flex; align-items: center; gap: 8px;\n  font-size: 12px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;\n  color: var(--orange); margin-bottom: 40px; opacity: 0;\n}\n.hero-label::before {\n  content: ''; display: block; width: 24px; height: 1.5px; background: var(--orange);\n}\n.hero-headline {\n  font-size: clamp(52px, 7.5vw, 106px); font-weight: 800; line-height: 1.02;\n  letter-spacing: -3px; color: var(--white); max-width: 900px;\n  opacity: 0;\n}\n.hero-headline .accent { color: var(--orange); }\n.hero-headline .stroke {\n  -webkit-text-stroke: 2px var(--orange);\n  color: transparent;\n}\n.hero-sub {\n  margin-top: 32px; font-size: clamp(16px, 1.5vw, 19px); color: rgba(255,255,255,0.5);\n  max-width: 500px; line-height: 1.7; opacity: 0;\n}\n.hero-ctas { margin-top: 48px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; opacity: 0; }\n.btn-fill {\n  background: var(--orange); color: var(--white);\n  padding: 16px 32px; border-radius: 100px;\n  font-size: 15px; font-weight: 700; text-decoration: none;\n  transition: transform 0.2s, opacity 0.2s; white-space: nowrap;\n}\n.btn-fill:hover { transform: scale(1.04); opacity: 0.88; }\n.btn-ghost {\n  color: rgba(255,255,255,0.7); font-size: 15px; font-weight: 600; text-decoration: none;\n  display: flex; align-items: center; gap: 8px;\n  transition: color 0.2s;\n}\n.btn-ghost::after { content: '↓'; transition: transform 0.2s; }\n.btn-ghost:hover { color: var(--white); }\n.btn-ghost:hover::after { transform: translateY(3px); }\n.hero-trust {\n  margin-top: 0; margin-bottom: 44px; display: flex; align-items: center; gap: 16px;\n  opacity: 0;\n}\n.hero-trust-line { width: 32px; height: 1px; background: rgba(255,255,255,0.25); }\n.hero-trust-text { font-size: 13px; color: rgba(255,255,255,0.35); font-weight: 500; letter-spacing: 0.04em; }\n\n/* ─── MARQUEE ─── */\n.marquee-wrap {\n  background: var(--orange); overflow: hidden; padding: 18px 0;\n  white-space: nowrap;\n}\n.marquee-track {\n  display: inline-flex; animation: marquee 22s linear infinite;\n  will-change: transform;\n}\n.marquee-track span {\n  font-size: 13px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;\n  color: var(--white); padding: 0 36px;\n}\n.marquee-track span.dot { opacity: 0.5; padding: 0 8px; }\n@keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }\n\n/* ─── METRICS ─── */\n#metrics { background: var(--black); padding: 100px 48px; }\n.metrics-inner { max-width: 1200px; margin: 0 auto; }\n.metrics-header { margin-bottom: 72px; display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap; }\n.metrics-tag { font-size: 12px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.3); display: block; margin-bottom: 18px; }\n.metrics-headline { font-size: clamp(28px, 3vw, 42px); font-weight: 800; color: var(--white); letter-spacing: -1px; line-height: 1.1; }\n.metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; overflow: hidden; }\n.metric-item { background: var(--black); padding: 44px 36px; }\n.metric-num {\n  font-size: clamp(48px, 5vw, 72px); font-weight: 800; color: var(--white);\n  letter-spacing: -2px; line-height: 1;\n}\n.metric-num .accent { color: var(--orange); }\n.metric-label { margin-top: 12px; font-size: 14px; color: rgba(255,255,255,0.35); font-weight: 500; line-height: 1.4; }\n\n/* ─── PROBLEM ─── */\n#problem { background: var(--black); padding: 120px 48px; overflow: hidden; }\n.problem-inner { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }\n.problem-tag { font-size: 12px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.25); margin-bottom: 28px; }\n.problem-left h2 { font-size: clamp(30px, 3.8vw, 52px); font-weight: 800; line-height: 1.1; letter-spacing: -1.5px; color: var(--white); }\n.problem-left h2 .problem-accent { color: var(--orange); }\n.problem-right p { font-size: 17px; color: rgba(255,255,255,0.45); line-height: 1.75; }\n.link-orange {\n  display: inline-flex; align-items: center; gap: 8px; margin-top: 32px;\n  font-size: 15px; font-weight: 700; color: var(--orange); text-decoration: none;\n  transition: gap 0.2s;\n}\n.link-orange::after { content: '→'; }\n.link-orange:hover { gap: 14px; }\n.problem-stats { margin-top: 44px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }\n.problem-stat-item { padding: 22px 20px; border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; }\n.problem-stat-num { font-size: 38px; font-weight: 800; color: var(--orange); letter-spacing: -1.5px; line-height: 1; }\n.problem-stat-text { font-size: 13px; color: rgba(255,255,255,0.3); line-height: 1.5; margin-top: 6px; }\n.problem-visual { position: relative; display: flex; align-items: center; justify-content: center; height: 320px; }\n.problem-ring-outer { position: absolute; width: 280px; height: 280px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.06); }\n.problem-ring-mid { position: absolute; width: 200px; height: 200px; border-radius: 50%; border: 1px solid rgba(255,92,43,0.18); }\n.problem-ring-inner { position: absolute; width: 116px; height: 116px; border-radius: 50%; background: rgba(255,92,43,0.08); border: 1.5px solid rgba(255,92,43,0.35); display: flex; align-items: center; justify-content: center; flex-direction: column; }\n.problem-ring-pct { font-size: 30px; font-weight: 800; color: var(--orange); letter-spacing: -1px; line-height: 1; }\n.problem-ring-sub { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.25); margin-top: 4px; }\n.problem-orbit { position: absolute; width: 10px; height: 10px; border-radius: 50%; background: var(--orange); opacity: 0.8; animation: orbit 6s linear infinite; }\n.problem-orbit-2 { position: absolute; width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.25); animation: orbit2 10s linear infinite; }\n@keyframes orbit { from { transform: rotate(0deg) translateX(100px); } to { transform: rotate(360deg) translateX(100px); } }\n@keyframes orbit2 { from { transform: rotate(180deg) translateX(140px); } to { transform: rotate(540deg) translateX(140px); } }\n\n/* ─── SERVICES ─── */\n#services { background: var(--gray-light); padding: 120px 48px; }\n.services-inner { max-width: 1200px; margin: 0 auto; }\n.services-header { margin-bottom: 64px; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 24px; }\n.section-label { font-size: 12px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--orange); margin-bottom: 16px; }\n.section-h2 { font-size: clamp(28px, 3.5vw, 46px); font-weight: 800; letter-spacing: -1.2px; line-height: 1.08; max-width: 500px; }\n.services-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }\n.service-card {\n  background: var(--white); border-radius: 20px; padding: 40px;\n  border: 1px solid rgba(0,0,0,0.05);\n  transition: transform 0.3s cubic-bezier(.22,.68,0,1.2), box-shadow 0.3s;\n  position: relative; overflow: hidden;\n}\n.service-card::before {\n  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;\n  background: var(--orange); transform: scaleX(0); transform-origin: left;\n  transition: transform 0.3s ease;\n}\n.service-card:hover { transform: translateY(-6px); box-shadow: 0 24px 60px rgba(0,0,0,0.1); }\n.service-card:hover::before { transform: scaleX(1); }\n.service-num { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; color: var(--orange); opacity: 0.6; margin-bottom: 20px; }\n.service-icon-wrap {\n  width: 48px; height: 48px; border-radius: 12px; background: rgba(255,92,43,0.08);\n  display: flex; align-items: center; justify-content: center; margin-bottom: 24px;\n}\n.service-icon-wrap svg { width: 22px; height: 22px; stroke: var(--orange); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }\n.service-title { font-size: 20px; font-weight: 700; margin-bottom: 10px; letter-spacing: -0.4px; }\n.service-desc { font-size: 15px; color: var(--gray-text); line-height: 1.65; }\n\n/* ─── HOW IT WORKS ─── */\n#how { background: var(--black); padding: 120px 48px; }\n.how-inner { max-width: 1200px; margin: 0 auto; }\n.how-header { margin-bottom: 80px; }\n.how-header .section-label { color: rgba(255,255,255,0.35); }\n.how-header .section-h2 { color: var(--white); }\n.steps-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 48px; position: relative; }\n.steps-row::after {\n  content: ''; position: absolute;\n  top: 28px; left: 56px; right: 56px; height: 1px;\n  background: repeating-linear-gradient(90deg, rgba(255,92,43,0.4) 0, rgba(255,92,43,0.4) 6px, transparent 6px, transparent 14px);\n  z-index: 0;\n}\n.step { posi ans-serif\" font-size=\"13\" font-weight=\"800\" fill=\"#0D0D0D\">$12M+<\u002Ftext>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <h3 class=\"service-title\">Analytics &amp; Attribution<\u002Fh3>\n        <p class=\"service-desc\">Clear dashboards. Revenue attribution. No vanity metrics, just actionable insights.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- HOW IT WORKS -->\n<section id=\"how\">\n  <div class=\"how-inner\">\n    <div class=\"how-header\">\n      <p class=\"section-label\">Process<\u002Fp>\n      <h2 class=\"section-h2\">Simple. Transparent.<br>Results-driven.<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"steps-row\">\n      <div class=\"step\">\n        <div class=\"step-num-wrap\"><span class=\"step-num-text\">01<\u002Fspan><\u002Fdiv>\n        <h3 class=\"step-title\">Discovery Call<\u002Fh3>\n        <p class=\"step-desc\">We learn your business, your customers, and where you're bleeding retention.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <div class=\"step-num-wrap\"><span class=\"step-num-text\">02<\u002Fspan><\u002Fdiv>\n        <h3 class=\"step-title\">Custom Strategy<\u002Fh3>\n        <p class=\"step-desc\">A tailored retention roadmap built for your brand — not a one-size-fits-all template.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <div class=\"step-num-wrap\"><span class=\"step-num-text\">03<\u002Fspan><\u002Fdiv>\n        <h3 class=\"step-title\">Implementation<\u002Fh3>\n        <p class=\"step-desc\">We build and launch flows, campaigns, and loyalty systems — fast.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <div class=\"step-num-wrap\"><span class=\"step-num-text\">04<\u002Fspan><\u002Fdiv>\n        <h3 class=\"step-title\">Optimize &amp; Scale<\u002Fh3>\n        <p class=\"step-desc\">Continuous testing and iteration to compound your retention rate month over month.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- TESTIMONIAL -->\n<section id=\"testimonial\">\n  <div class=\"testimonial-bg-num\">47%<\u002Fdiv>\n  <div class=\"testimonial-inner\">\n    <span class=\"testimonial-quote-icon\">\"<\u002Fspan>\n    <p class=\"testimonial-text\">STIQY transformed our email program from an afterthought into our most profitable channel. We've seen a 47% increase in repeat purchases.<\u002Fp>\n    <div class=\"testimonial-attr\" style=\"margin-top:40px;\">\n      <p class=\"testimonial-name\">Sarah Chen<\u002Fp>\n      <p class=\"testimonial-role\">Founder, Glowly Skin<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FINAL CTA -->\n<section id=\"cta\">\n  <div class=\"cta-shape-1\"><\u002Fdiv>\n  <div class=\"cta-shape-2\"><\u002Fdiv>\n  <div class=\"cta-shape-3\"><\u002Fdiv>\n  <div class=\"cta-inner\">\n    <h2 class=\"cta-h2\">Ready to turn customers<br>into <span class=\"accent\">loyal fans?<\u002Fspan><\u002Fh2>\n    <p class=\"cta-sub\">Book a free strategy call. No commitment. Let's just talk.<\u002Fp>\n    <div class=\"cta-btn-wrap\">\n      <a href=\"https://calendly.com/hi-stiqy/30min\" target=\"_blank\" class=\"btn-fill\" style=\"font-size:16px;padding:18px 40px;\">Book Your Free Call Now<\u002Fa>\n    <\u002Fdiv>\n    <p class=\"cta-no-commit\">No commitment required.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER -->\n<footer>\n  <span class=\"footer-logo\">STIQY<\u002Fspan>\n  <span class=\"footer-copy\">© 2026 STIQY. All rights reserved.<\u002Fspan>\n<\u002Ffooter>\n\n<!-- TWEAKS -->\n<div id=\"tweaks-panel\">\n  <button class=\"tweak-close\" id=\"tweaks-close\">×<\u002Fbutton>\n  <h4>Tweaks<\u002Fh4>\n  <div class=\"tweak-row\">\n    <div class=\"tweak-label\">Accent Color<\u002Fdiv>\n    <div class=\"tweak-options\">\n      <div class=\"tweak-swatch active\" style=\"background:#FF5C2B\" data-accent=\"#FF5C2B\"><\u002Fdiv>\n      <div class=\"tweak-swatch\" style=\"background:#0055FF\" data-accent=\"#0055FF\"><\u002Fdiv>\n      <div class=\"tweak-swatch\" style=\"background:#00C172\" data-accent=\"#00C172\"><\u002Fdiv>\n      <div class=\"tweak-swatch\" style=\"background:#BF5AF2\" data-accent=\"#BF5AF2\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"tweak-row\">\n    <div class=\"tweak-label\">Hero BG<\u002Fdiv>\n    <div class=\"tweak-options\">\n      <button class=\"tweak-btn active\" data-herobg=\"dark\">Dark<\u002Fbutton>\n      <button class=\"tweak-btn\" data-herobg=\"light\">Light<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"tweak-row\">\n    <div class=\"tweak-label\">Marquee Speed<\u002Fdiv>\n    <div class=\"tweak-options\">\n      <button class=\"tweak-btn\" data-speed=\"slow\">Slow<\u002Fbutton>\n      <button class=\"tweak-btn active\" data-speed=\"normal\">Normal<\u002Fbutton>\n      <button class=\"tweak-btn\" data-speed=\"fast\">Fast<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\ngsap.registerPlugin(ScrollTrigger);\n\n// ── TWEAKS ──\nconst TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n  \"accentColor\": \"#FF5C2B\",\n  \"heroBg\": \"dark\",\n  \"marqueeSpeed\": \"normal\"\n}/*EDITMODE-END*/;\nlet tweaks = { ...TWEAK_DEFAULTS };\n\nwindow.addEventListener('message', e => {\n  if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').classList.add('open');\n  if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('open');\n});\nwindow.parent.postMessage({ type: '__edit_mode_available' }, '*');\ndocument.getElementById('tweaks-close').onclick = () => document.getElementById('tweaks-panel').classList.remove('open');\n\nfunction applyTweaks() {\n  document.documentElement.style.setProperty('--orange', tweaks.accentColor);\n  const hero = document.getElementById('hero');\n  if (tweaks.heroBg === 'light') {\n    hero.style.background = '#F4F4F2';\n    document.querySelector('.hero-headline').style.color = '#0D0D0D';\n    document.querySelector('.hero-sub').style.color = '#666';\n    document.querySelector('.hero-trust-text').style.color = '#999';\n  } else {\n    hero.style.background = '#0D0D0D';\n    document.querySelector('.hero-headline').style.color = '';\n    document.querySelector('.hero-sub').style.color = '';\n    document.querySelector('.hero-trust-text').style.color = '';\n  }\n  const speeds = { slow: '36s', normal: '22s', fast: '12s' };\n  document.getElementById('marquee-track').style.animationDuration = speeds[tweaks.marqueeSpeed] || '22s';\n}\n\ndocument.querySelectorAll('.tweak-swatch').forEach(sw => {\n  sw.addEventListener('click', () => {\n    document.querySelectorAll('.tweak-swatch').forEach(s => s.classList.remove('active'));\n    sw.classList.add('active');\n    tweaks.accentColor = sw.dataset.accent;\n    applyTweaks();\n    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accentColor: tweaks.accentColor } }, '*');\n  });\n});\ndocument.querySelectorAll('[data-herobg]').forEach(btn => {\n  btn.addEventListener('click', () => {\n    document.querySelectorAll('[data-herobg]').forEach(b => b.classList.remove('active'));\n    btn.classList.add('active'); tweaks.heroBg = btn.dataset.herobg;\n    applyTweaks();\n    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { heroBg: tweaks.heroBg } }, '*');\n  });\n});\ndocument.querySelectorAll('[data-speed]').forEach(btn => {\n  btn.addEventListener('click', () => {\n    document.querySelectorAll('[data-speed]').forEach(b => b.classList.remove('active'));\n    btn.classList.add('active'); tweaks.marqueeSpeed = btn.dataset.speed;\n    applyTweaks();\n    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { marqueeSpeed: tweaks.marqueeSpeed } }, '*');\n  });\n});\n\n// ── NAV ──\nwindow.addEventListener('scroll', () => {\n  document.getElementById('main-nav').classList.toggle('scrolled', window.scrollY > 50);\n});\ndocument.getElementById('hamburger').addEventListener('click', () => {\n  document.getElementById('nav-links').classList.toggle('open');\n});\n\n// ── HERO ENTRANCE ──\nfunction wrapWords(el) {\n  el.childNodes.forEach(node => {\n    if (node.nodeType === 3) {\n      const words = node.textContent.split(/(\\s+)/);\n      const frag = document.createDocumentFragment();\n      words.forEach(w => {\n        if (w.trim()) {\n          const outer = document.createElement('span'); outer.className = 'word-clip';\n          const inner = document.createElement('span'); inner.className = 'word-inner';\n          inner.textContent = w; outer.appendChild(inner); frag.appendChild(outer);\n        } else { frag.appendChild(document.createTextNode(w)); }\n      });\n      node.replaceWith(frag);\n    }\n  });\n}\nwrapWords(document.getElementById('hero-headline'));\ndocument.getElementById('hero-headline').style.opacity = '1';\n\nconst heroTl = gsap.timeline({ delay: 0.25 });\nheroTl\n  .fromTo('#hero-trust', { opacity:0 }, { opacity:1, duration:0.5, ease:'power2.out' })\n  .fromTo('#hero-headline .word-inner', { y:'105%' }, { y:'0%', duration:0.75, stagger:0.06, ease:'power3.out' }, '-=0.1')\n  .fromTo('#hero-sub',   { opacity:0, y:20 }, { opacity:1, y:0, duration:0.6, ease:'power3.out' }, '-=0.3')\n  .fromTo('#hero-ctas',  { opacity:0, y:16 }, { opacity:1, y:0, duration:0.5, ease:'power3.out' }, '-=0.3')\n  .fromTo('#hero-dashboard', { opacity:0, x:28 }, { opacity:1, x:0, duration:0.9, ease:'power3.out' }, '-=0.7');\n\n// ── SCROLL ANIMATIONS ──\ngsap.utils.toArray('.metric-item').forEach((el, i) => {\n  gsap.fromTo(el, { opacity: 0, y: 30 }, {\n    opacity: 1, y: 0, duration: 0.6, delay: i * 0.1, ease: 'power3.out',\n    scrollTrigger: { trigger: el, start: 'top 85%', toggleActions: 'play none none none' }\n  });\n});\n\ngsap.fromTo('.problem-left', { opacity: 0, x: -40 }, {\n  opacity: 1, x: 0, duration: 0.8, ease: 'power3.out',\n  scrollTrigger: { trigger: '#problem', start: 'top 75%' }\n});\ngsap.fromTo('.problem-right', { opacity: 0, x: 40 }, {\n  opacity: 1, x: 0, duration: 0.8, ease: 'power3.out', delay: 0.15,\n  scrollTrigger: { trigger: '#problem', start: 'top 75%' }\n});\n\ngsap.utils.toArray('.service-card').forEach((el, i) => {\n  gsap.fromTo(el, { opacity: 0, y: 40 }, {\n    opacity: 1, y: 0, duration: 0.6, delay: i * 0.1, ease: 'power3.out',\n    scrollTrigger: { trigger: '#services', start: 'top 75%' }\n  });\n});\n\ngsap.utils.toArray('.step').forEach((el, i) => {\n  gsap.fromTo(el, { opacity: 0, y: 30 }, {\n    opacity: 1, y: 0, duration: 0.6, delay: i * 0.15, ease: 'power3.out',\n    scrollTrigger: { trigger: '#how', start: 'top 75%' }\n  });\n});\n\ngsap.fromTo('.testimonial-inner', { opacity: 0, scale: 0.96 }, {\n  opacity: 1, scale: 1, duration: 0.9, ease: 'power3.out',\n  scrollTrigger: { trigger: '#testimonial', start: 'top 75%' }\n});\n\ngsap.fromTo('.cta-inner', { opacity: 0, y: 40 }, {\n  opacity: 1, y: 0, duration: 0.8, ease: 'power3.out',\n  scrollTrigger: { trigger: '#cta', start: 'top 75%' }\n});\n\n// Parallax on hero bg word\ngsap.to('.hero-bg-word', {\n  yPercent: 30, ease: 'none',\n  scrollTrigger: { trigger: '#hero', start: 'top top', end: 'bottom top', scrub: true }\n});\n\n// CTA rings pulse\ngsap.to('.cta-shape-1', { scale: 1.08, duration: 3, repeat: -1, yoyo: true, ease: 'sine.inOut' });\ngsap.to('.cta-shape-2', { scale: 1.12, duration: 3.8, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 0.4 });\n\n// Step connector draw\nScrollTrigger.create({\n  trigger: '#how', start: 'top 70%',\n  onEnter: () => gsap.to('#steps-line', { width:'100%', duration:1.4, ease:'power2.inOut', delay:0.3 })\n});\n\n// ── COUNTERS ──\nfunction animateCounter(el) {\n  const target = parseFloat(el.dataset.target);\n  const decimals = parseInt(el.dataset.decimal || '0');\n  const duration = 1800;\n  const start = performance.now();\n  function tick(now) {\n    const p = Math.min((now - start) / duration, 1);\n    const eased = 1 - Math.pow(1 - p, 3);\n    const val = target * eased;\n    el.textContent = decimals ? val.toFixed(decimals) : Math.floor(val);\n    if (p < 1) requestAnimationFrame(tick);\n  }\n  requestAnimationFrame(tick);\n}\nconst cObs = new IntersectionObserver(entries => {\n  entries.forEach(en => { if (en.isIntersecting) { animateCounter(en.target); cObs.unobserve(en.target); } });\n}, { threshold: 0.5 });\ndocument.querySelectorAll('.counter').forEach(el => cObs.observe(el));\n\napplyTweaks();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
